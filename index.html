<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto GitHub</title>
    <style>
        /* --- CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .card p {
            margin: 15px 0;
        }

        button {
            background: #ffffff;
            color: #4f46e5;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #mensagem {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu Projeto GitHub</h1>
        <p>Site criado com HTML, CSS e JavaScript</p>
    </header>

    <main>
        <div class="card">
            <h2>Bem-vindo!</h2>
            <p>Clique no botão para mudar a mensagem.</p>

            <button id="btn">Clique Aqui</button>

            <p id="mensagem">
                Sua mensagem aparecerá aqui.
            </p>
        </div>
    </main>

    <script>
        // --- JavaScript ---
        const botao = document.getElementById("btn");
        const mensagem = document.getElementById("mensagem");

        const frases = [
            "🚀 Projeto funcionando!",
            "💻 Código executado com sucesso!",
            "🎉 Bem-vindo ao GitHub Pages!",
            "🔥 JavaScript está ativo!",
            "⭐ Continue criando projetos incríveis!"
        ];

        botao.addEventListener("click", () => {
            const indice = Math.floor(Math.random() * frases.length);
            mensagem.textContent = frases[indice];
        });
    </script>
</body>
</html>
